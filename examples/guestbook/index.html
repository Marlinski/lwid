<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guestbook</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <div class="header">
    <img src="img/logo.svg" alt="Guestbook logo">
    <h1>Guestbook</h1>
  </div>
  <p class="subtitle">Leave a message. Stored encrypted on lookwhatidid.ovh</p>

  <div id="form">
    <input id="name" type="text" placeholder="Your name" maxlength="60">
    <textarea id="message" placeholder="Say something..." maxlength="500"></textarea>
    <button id="submit">Sign</button>
  </div>

  <div class="count" id="count"></div>
  <div class="entries" id="entries">
    <p class="empty">Loading...</p>
  </div>
</div>

<script type="module">
  const STORE_KEY = 'entries';

  // ── Helpers ────────────────────────────────────────────

  async function loadEntries() {
    return (await lwid.store.get(STORE_KEY)) || [];
  }

  async function saveEntries(entries) {
    await lwid.store.set(STORE_KEY, entries);
  }

  function timeAgo(ts) {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return `${Math.floor(s / 60)}m ago`;
    if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
    return `${Math.floor(s / 86400)}d ago`;
  }

  // ── Render ─────────────────────────────────────────────

  function render(entries) {
    const el = document.getElementById('entries');
    const countEl = document.getElementById('count');

    if (!entries.length) {
      el.innerHTML = '<p class="empty">No entries yet. Be the first!</p>';
      countEl.textContent = '';
      return;
    }

    countEl.textContent = `${entries.length} ${entries.length === 1 ? 'entry' : 'entries'}`;

    el.innerHTML = entries
      .slice()
      .reverse()
      .map(e => `
        <div class="entry">
          <div class="entry-header">
            <span class="entry-name">${esc(e.name)}</span>
            <span class="entry-time">${timeAgo(e.ts)}</span>
          </div>
          <div class="entry-msg">${esc(e.msg)}</div>
        </div>
      `).join('');
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ── Init ───────────────────────────────────────────────

  const entries = await loadEntries();
  render(entries);

  document.getElementById('submit').addEventListener('click', async () => {
    const btn = document.getElementById('submit');
    const nameEl = document.getElementById('name');
    const msgEl  = document.getElementById('message');

    const name = nameEl.value.trim();
    const msg  = msgEl.value.trim();
    if (!name || !msg) return;

    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
      entries.push({ name, msg, ts: Date.now() });
      await saveEntries(entries);
      render(entries);
      msgEl.value = '';
    } catch (err) {
      entries.pop();
      alert('Error: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign';
    }
  });
</script>

</body>
</html>

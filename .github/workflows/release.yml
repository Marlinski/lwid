name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build ${{ matrix.binary }}-linux-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary: lwid
            package: lwid-cli
            target: x86_64-unknown-linux-musl
            arch: x86_64
            use_cross: false

          - binary: lwid
            package: lwid-cli
            target: aarch64-unknown-linux-musl
            arch: aarch64
            use_cross: true

          - binary: lwid-server
            package: lwid-server
            target: x86_64-unknown-linux-musl
            arch: x86_64
            use_cross: false

          - binary: lwid-server
            package: lwid-server
            target: aarch64-unknown-linux-musl
            arch: aarch64
            use_cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (native)
        if: ${{ !matrix.use_cross }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cross build --release --target ${{ matrix.target }} --package ${{ matrix.package }}

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --release --target ${{ matrix.target }} --package ${{ matrix.package }}

      - name: Rename binary
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          dst="${{ matrix.binary }}-linux-${{ matrix.arch }}"
          cp "$src" "$dst"
          chmod +x "$dst"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-linux-${{ matrix.arch }}
          path: ${{ matrix.binary }}-linux-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 1

  build-macos:
    name: Build ${{ matrix.binary }}-darwin-universal
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary: lwid
            package: lwid-cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin --package ${{ matrix.package }}

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin --package ${{ matrix.package }}

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/${{ matrix.binary }} \
            target/x86_64-apple-darwin/release/${{ matrix.binary }} \
            -output ${{ matrix.binary }}-darwin-universal
          chmod +x ${{ matrix.binary }}-darwin-universal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-darwin-universal
          path: ${{ matrix.binary }}-darwin-universal
          if-no-files-found: error
          retention-days: 1

  build-windows:
    name: Build lwid-windows-x86_64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc --package lwid-cli

      - name: Rename binary
        run: copy target\x86_64-pc-windows-msvc\release\lwid.exe lwid-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lwid-windows-x86_64.exe
          path: lwid-windows-x86_64.exe
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: ls -lah artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  test-windows-install:
    name: Test Windows installer
    needs: [release]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run install.ps1 for this release
        env:
          LWID_VERSION: ${{ github.ref_name }}
        run: |
          $env:LWID_VERSION = "${{ github.ref_name }}"
          ./install.ps1

      - name: Verify lwid runs
        run: |
          $exe = Join-Path $env:LOCALAPPDATA 'lwid\lwid.exe'
          & $exe --version

  docker:
    name: Build & Push Docker Image
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download pre-built server binary
        uses: actions/download-artifact@v4
        with:
          name: lwid-server-linux-x86_64
          path: .

      - name: Prepare binary for Docker context
        run: |
          mv lwid-server-linux-x86_64 lwid-server
          chmod +x lwid-server

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prebuilt
          push: true
          tags: |
            ghcr.io/marlinski/lwid-server:latest
            ghcr.io/marlinski/lwid-server:${{ steps.tag.outputs.version }}

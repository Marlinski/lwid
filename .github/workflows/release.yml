name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.binary }}-${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # lwid CLI — linux x86_64
          - binary: lwid
            package: lwid-cli
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            arch: x86_64
            use_cross: false

          # lwid CLI — linux aarch64 (cross-compiled)
          - binary: lwid
            package: lwid-cli
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            arch: aarch64
            use_cross: true

          # lwid CLI — darwin x86_64
          - binary: lwid
            package: lwid-cli
            target: x86_64-apple-darwin
            runner: macos-13
            os: darwin
            arch: x86_64
            use_cross: false

          # lwid CLI — darwin aarch64
          - binary: lwid
            package: lwid-cli
            target: aarch64-apple-darwin
            runner: macos-14
            os: darwin
            arch: aarch64
            use_cross: false

          # lwid-server — linux x86_64
          - binary: lwid-server
            package: lwid-server
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            arch: x86_64
            use_cross: false

          # lwid-server — linux aarch64 (cross-compiled)
          - binary: lwid-server
            package: lwid-server
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            arch: aarch64
            use_cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --package ${{ matrix.package }}

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }} --package ${{ matrix.package }}

      - name: Rename binary
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          dst="${{ matrix.binary }}-${{ matrix.os }}-${{ matrix.arch }}"
          cp "$src" "$dst"
          chmod +x "$dst"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ matrix.binary }}-${{ matrix.os }}-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: ls -lah artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

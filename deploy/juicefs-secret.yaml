# JuiceFS credentials — created from .env via:
#   kubectl create secret generic juicefs-secret -n lwid \
#     --from-literal=name=$JUICEFS_NAME \
#     --from-literal=metaurl=$JUICEFS_METAURL \
#     --from-literal=storage=$JUICEFS_STORAGE \
#     --from-literal=bucket=$JUICEFS_BUCKET \
#     --from-literal=access-key=$JUICEFS_ACCESS_KEY \
#     --from-literal=secret-key=$JUICEFS_SECRET_KEY
apiVersion: v1
kind: Secret
metadata:
  name: juicefs-secret
  namespace: lwid
  labels:
    app.kubernetes.io/name: lwid
    app.kubernetes.io/component: storage
type: Opaque
stringData:
  name: "${JUICEFS_NAME}"
  metaurl: "${JUICEFS_METAURL}"
  storage: "${JUICEFS_STORAGE}"
  bucket: "${JUICEFS_BUCKET}"
  access-key: "${JUICEFS_ACCESS_KEY}"
  secret-key: "${JUICEFS_SECRET_KEY}"
